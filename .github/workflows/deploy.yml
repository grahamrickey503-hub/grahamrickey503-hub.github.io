name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build site
        run: |
          set -e
          if [ -f package.json ]; then
            echo "Detected Node project; running npm build if available"
            npm ci --silent
            npm run build --if-present || true
            for d in build public dist _site; do
              if [ -d "$d" ]; then
                rm -rf docs && mkdir -p docs
                cp -r "$d"/. docs/
                exit 0
              fi
            done
          elif [ -f Gemfile ] || ls *.gemspec >/dev/null 2>&1; then
            echo "Detected Jekyll project; building to docs/"
            gem install bundler --no-document
            bundle config set path vendor/bundle
            bundle install
            bundle exec jekyll build -d docs
          else
            echo "No build system detected; creating a minimal docs/index.html"
            mkdir -p docs
            if [ -z "$(ls -A docs)" ]; then
                printf '%s\n' '<!doctype html>' '<meta charset="utf-8">' '<title>GitHub Pages</title>' '<h1>Site deployed</h1>' > docs/index.html
            fi
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
